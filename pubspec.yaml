name: taxi_driver_bw
description: Taxi Driver BW - Unified ride-sharing app with 3 login types (Passenger, Driver, Admin)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  go_router: ^13.0.0
  responsive_sizer: ^3.3.1
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_messaging: ^14.6.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  location: ^5.0.0
  
  # Forms & Validation
  form_builder_validators: ^9.1.0
  flutter_form_builder: ^9.1.0
  
  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.0.0
  crypto: ^3.0.0
  
  # Media
  image_picker: ^1.0.0
  camera: ^0.10.5
  
  # PDF
  pdf: ^3.10.0
  
  # Logging
  logger: ^2.0.0
  
  # Environment
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
